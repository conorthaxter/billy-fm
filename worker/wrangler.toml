name = "billy-fm-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "billy-fm-db"
database_id = "placeholder-replace-after-wrangler-d1-create"
migrations_dir = "migrations"

# ---------------------------------------------------------------------------
# Environment variables
# Non-sensitive vars go here. Secrets must use: wrangler secret put <KEY>
# ---------------------------------------------------------------------------
[vars]
FRONTEND_ORIGIN = "http://localhost:5173"
GOOGLE_REDIRECT_URI = "http://localhost:8787/auth/google/callback"
GOOGLE_CLIENT_ID = "404273759146-64g116fa86s8lm82oq3u8depdro22pds.apps.googleusercontent.com"

# ---------------------------------------------------------------------------
# Secrets (do NOT put real values here — use `wrangler secret put` instead)
# wrangler secret put GOOGLE_CLIENT_SECRET
# wrangler secret put SESSION_SECRET
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Production overrides
# ---------------------------------------------------------------------------
[env.production.vars]
FRONTEND_ORIGIN = "https://your-app.pages.dev"
GOOGLE_REDIRECT_URI = "https://billy-fm-worker.your-subdomain.workers.dev/auth/google/callback"
GOOGLE_CLIENT_ID = "404273759146-64g116fa86s8lm82oq3u8depdro22pds.apps.googleusercontent.com"
