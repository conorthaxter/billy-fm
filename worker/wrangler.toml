name = "billy-fm-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "billy-fm-db"
database_id = "b0ae9223-278b-4e88-b37a-740cb4b88a55"
migrations_dir = "migrations"

# ---------------------------------------------------------------------------
# Environment variables
# Non-sensitive vars go here. Secrets must use: wrangler secret put <KEY>
# ---------------------------------------------------------------------------
[vars]
FRONTEND_ORIGIN = "https://billy-fm.pages.dev"
GOOGLE_REDIRECT_URI = "https://billy-fm-worker.conorthaxter.workers.dev/auth/google/callback"
GOOGLE_CLIENT_ID = "404273759146-64g116fa86s8lm82oq3u8depdro22pds.apps.googleusercontent.com"
ENABLE_CLIENT_SETS = "true"
ARTIST_EMAIL = "conorthaxter@gmail.com"

[triggers]
crons = ["0 16 * * 1"]

# ---------------------------------------------------------------------------
# Secrets (do NOT put real values here — use `wrangler secret put` instead)
# wrangler secret put GOOGLE_CLIENT_SECRET
# wrangler secret put SESSION_SECRET
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Production overrides
# ---------------------------------------------------------------------------
[env.production.vars]
FRONTEND_ORIGIN = "https://billy-fm.pages.dev"
GOOGLE_REDIRECT_URI = "https://billy-fm-worker.conorthaxter.workers.dev/auth/google/callback"
GOOGLE_CLIENT_ID = "404273759146-64g116fa86s8lm82oq3u8depdro22pds.apps.googleusercontent.com"
