<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BILLY fm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;border-radius:0!important}
:root{--font:'Inter',system-ui,-apple-system,sans-serif;--mono:'Courier New',Courier,monospace;--rp:310px;--lp:180px;--sp:0px}
body{font-family:var(--font);background:#fff;color:#000;height:100vh;overflow:hidden;font-size:13px}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;height:42px;border-bottom:1px solid #000;display:flex;align-items:center;padding:0 10px;gap:7px;background:#fff;z-index:100}
#nav-title{font-size:15px;font-weight:700;letter-spacing:2px;white-space:nowrap;font-family:var(--mono)}
#nav-session{font-size:10px;color:#777;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}
#nav-center{display:flex;align-items:center;gap:4px;flex:1;justify-content:center;overflow:hidden;min-width:0}
#nav-right{display:flex;align-items:center;gap:4px;white-space:nowrap}
.nb{font-family:var(--mono);font-size:11px;border:1px solid #000;background:#fff;padding:3px 8px;cursor:pointer;white-space:nowrap;line-height:1.5}
.nb:hover,.nb.on{background:#000;color:#fff}
.nb.accent{background:#000;color:#fff}
.nb.accent:hover{background:#333}
#filter-chips{display:flex;gap:2px;overflow:hidden;flex-wrap:nowrap}
.chip{font-size:10px;border:1px solid #000;padding:1px 6px;cursor:pointer;background:#000;color:#fff;display:flex;align-items:center;gap:3px}
.chip:hover{background:#333}
#match-count{font-size:10px;color:#999;white-space:nowrap}

/* PROGRESS */
#enrich-bar{height:3px;background:#000;position:fixed;top:42px;left:0;z-index:110;transition:width .3s;pointer-events:none;width:0}
#status-bar{position:fixed;top:42px;left:0;right:0;background:#000;color:#fff;font-size:10px;padding:2px 10px;z-index:98;display:none;height:18px;align-items:center}
#status-bar.on{display:flex}

/* SEARCH */
#search-bar{display:none;position:fixed;top:42px;left:var(--sp);right:var(--rp);background:#fff;border-bottom:1px solid #000;padding:5px 10px;z-index:99;align-items:center;gap:8px}
#search-bar.on{display:flex}
#search-input{font-family:var(--font);font-size:13px;border:1px solid #000;padding:3px 8px;flex:1;outline:none;background:#fff}
#search-sug{display:none;position:fixed;top:75px;left:var(--sp);right:var(--rp);background:#fff;border:2px solid #000;border-top:none;z-index:200;max-height:280px;overflow-y:auto}
#search-sug.on{display:block}
.si{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border-bottom:1px solid #eee}
.si:hover{background:#f5f5f5}
.si:last-child{border-bottom:none}
.si-dot{width:12px;height:12px;flex-shrink:0;border:1px solid rgba(0,0,0,.2)}
.si-info{flex:1;overflow:hidden}
.si-title{font-size:12px;font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.si-sub{font-size:10px;color:#777}
.si-qbtn{font-family:var(--font);font-size:10px;border:1px solid #000;background:#fff;padding:2px 7px;cursor:pointer;flex-shrink:0}
.si-qbtn:hover{background:#000;color:#fff}

/* SETS PANEL (left) */
#sets-panel{position:fixed;top:42px;left:0;width:0;bottom:0;border-right:1px solid #000;background:#fff;z-index:92;display:flex;flex-direction:column;overflow:hidden;transition:none}
#sets-panel.on{width:var(--sp)}
#sp-resize{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:93}
#sp-resize:hover{background:rgba(0,0,0,.12)}
#sp-hdr{border-bottom:1px solid #000;padding:7px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#sp-hdr h3{font-size:12px;font-weight:bold;flex:1}
#sp-body{flex:1;overflow-y:auto;padding:6px}
.sp-set{border:1px solid #000;margin-bottom:5px}
.sp-set-hdr{padding:6px 8px;display:flex;align-items:center;gap:6px;cursor:pointer;background:#f8f8f8}
.sp-set-hdr:hover{background:#f0f0f0}
.sp-set-title{font-weight:bold;font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-set-meta{font-size:9px;color:#888}
.sp-set-body{display:none;padding:4px}
.sp-set.open .sp-set-body{display:block}
.sp-song-row{display:flex;align-items:center;gap:5px;padding:3px 2px;border-bottom:1px solid #f0f0f0;font-size:10px;cursor:default}
.sp-song-row:hover{background:#fafafa}
.sp-cb{width:12px;height:12px;cursor:pointer;flex-shrink:0}
.sp-kdot{width:9px;height:9px;flex-shrink:0;border:1px solid rgba(0,0,0,.2)}
.sp-song-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-copy-bar{position:sticky;bottom:0;background:#fff;border-top:1px solid #000;padding:5px 6px;display:none}
.sp-copy-bar.on{display:flex;gap:5px;align-items:center}
.sp-note-area{padding:4px;border-top:1px solid #eee}
.sp-note-area textarea{font-family:var(--font);font-size:10px;border:1px solid #ccc;width:100%;padding:3px 5px;outline:none;resize:vertical;min-height:40px;background:#fffef5}
.sp-note-area textarea:focus{border-color:#000}

/* FILTER PANEL */
#filter-panel{position:fixed;top:42px;left:var(--sp);width:var(--lp);bottom:0;border-right:1px solid #000;overflow-y:auto;background:#fff;z-index:90;display:none}
#filter-panel.on{display:block}
.fp-sec{border-bottom:1px solid #000;padding:8px}
.fp-hd{font-weight:bold;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.fp-row{display:flex;align-items:center;gap:5px;padding:3px 0;cursor:pointer;font-size:11px}
.fp-row input{cursor:pointer;margin:0}
.fp-row:hover{text-decoration:underline}
.fp-info{font-size:10px;color:#666;line-height:1.6}
.fp-actions{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.fp-btn{font-family:var(--mono);font-size:10px;border:1px solid #000;background:#fff;padding:3px 8px;cursor:pointer}
.fp-btn:hover{background:#000;color:#fff}
.fp-btn.primary{background:#000;color:#fff}
.fp-btn.primary:hover{background:#333}

/* CHORD PANEL */
#chord-panel{display:none;position:fixed;top:42px;left:var(--sp);right:var(--rp);bottom:0;flex-direction:column;background:#fff;z-index:85}
#chord-panel.on{display:flex}
#chord-hdr{border-bottom:1px solid #000;padding:6px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#chord-hdr-title{font-weight:bold;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
#chord-iframe{flex:1;border:none;width:100%;height:100%}
#chord-blocked{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-size:13px;color:#666}
#chord-blocked.on{display:flex}

/* MAIN */
#main{position:fixed;top:42px;left:calc(var(--sp) + var(--lp-active, 0px));right:var(--rp);bottom:0;overflow:hidden;display:flex;flex-direction:column}
#grid-area{flex:1;overflow-y:auto;padding:10px}
#controls{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
#controls select{font-family:var(--font);font-size:11px;border:1px solid #000;padding:3px 6px;background:#fff;outline:none;cursor:pointer}
#error-banner{display:none;background:#ff0;border:2px solid #000;padding:6px 12px;font-size:12px;font-weight:bold;margin-bottom:8px}
#error-banner.on{display:block}
#skeleton{display:grid;grid-template-columns:repeat(auto-fill,168px);gap:3px}
.skel{width:168px;height:70px;background:#eee;animation:pulse 1s ease-in-out infinite alternate}
@keyframes pulse{from{background:#eee}to{background:#ddd}}
#song-grid{display:grid;grid-template-columns:repeat(auto-fill,168px);gap:3px}

/* SONG CELL */
.sc{width:168px;height:70px;border:1px solid rgba(0,0,0,.2);padding:6px;cursor:pointer;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;transition:opacity 250ms ease,transform 250ms ease}
.sc:hover{border:2px solid rgba(0,0,0,.7)}
.sc.faded{opacity:.1;transform:scale(.9);pointer-events:none}
.sc.selected-cell{border:2px solid rgba(255,255,255,.6)!important;outline:2px solid rgba(0,0,0,.45)}
.sc.now-playing-cell{border:2px solid #fff!important;outline:3px solid #000}
.sc-title{font-size:13px;font-weight:700;line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}
.sc-artist{font-size:11px;opacity:.85;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.sc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:2px}
.sc-key-lbl{font-size:8px;font-weight:bold;opacity:.75}
.sc-bpm{font-size:8px;opacity:.6}
.sc-qbtn{position:absolute;bottom:5px;right:5px;width:20px;height:20px;border:1px solid currentColor;background:transparent;color:inherit;font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s;padding:0;font-family:var(--font)}
.sc:hover .sc-qbtn{opacity:.7}
.sc-qbtn:hover{opacity:1!important;background:rgba(0,0,0,.15)}

/* RIGHT PANEL */
#right-panel{position:fixed;top:42px;right:0;width:var(--rp);bottom:0;border-left:1px solid #000;background:#fff;display:flex;flex-direction:column;z-index:95;overflow:hidden}
#rp-resize{position:absolute;left:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:96}
#rp-resize:hover{background:rgba(0,0,0,.12)}

/* PREVIOUSLY PLAYED */
#pp-sec{border-bottom:1px solid #000;flex-shrink:0;max-height:32%;display:flex;flex-direction:column;overflow:hidden}
#pp-sec.collapsed{max-height:31px}
#pp-hdr{padding:5px 8px;border-bottom:1px solid #000;display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;font-weight:bold;background:#f8f8f8;flex-shrink:0}
#pp-hdr:hover{background:#efefef}
#pp-toggle{font-size:10px;transition:transform .15s}
#pp-sec.collapsed #pp-toggle{transform:rotate(-90deg)}
#pp-cnt{font-weight:normal;color:#888;font-size:10px}
#pp-clr{font-family:var(--font);font-size:9px;border:1px solid #000;background:#fff;padding:1px 5px;cursor:pointer;margin-left:auto}
#pp-clr:hover{background:#000;color:#fff}
#pp-list{overflow-y:auto;flex:1}
.pp-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid #f0f0f0;font-size:12px;cursor:pointer}
.pp-item:hover{background:#f8f8f8}
.pp-dot{width:10px;height:10px;flex-shrink:0;border:1px solid rgba(0,0,0,.2)}
.pp-inf{flex:1;overflow:hidden}
.pp-title{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.pp-meta{font-size:9px;color:#999}
.pp-rm{font-size:13px;cursor:pointer;color:#ccc;padding:0 3px;line-height:1;flex-shrink:0}
.pp-rm:hover{color:#000}

/* NOW PLAYING */
#np-sec{border-bottom:1px solid #000;flex-shrink:0}
#np-lbl{padding:5px 8px;font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;background:#f8f8f8;border-bottom:1px solid #000}
#np-content{padding:8px}
#np-empty{color:#bbb;font-size:11px}
#np-song{display:none}
#np-title{font-size:15px;font-weight:700;line-height:1.2;margin-bottom:2px}
#np-artist{font-size:12px;color:#555;margin-bottom:5px}
#np-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:5px}
.np-badge{display:inline-block;padding:2px 8px;font-size:11px;font-weight:bold;border:1px solid rgba(0,0,0,.2)}
.np-tag{font-size:10px;border:1px solid #000;padding:1px 5px;cursor:pointer}
.np-tag:hover{background:#000;color:#fff}
#np-chords-btn{display:none;font-family:var(--font);font-size:11px;border:1px solid #000;padding:3px 8px;cursor:pointer;background:#fff;width:100%;text-align:left;margin-bottom:5px}
#np-chords-btn:hover{background:#000;color:#fff}
#np-notes{font-size:10px;color:#666;line-height:1.5;margin-bottom:5px;max-height:48px;overflow-y:auto}
#np-actions{display:flex;gap:4px;flex-wrap:wrap}
.np-btn{font-family:var(--font);font-size:10px;border:1px solid #000;background:#fff;padding:3px 8px;cursor:pointer}
.np-btn:hover{background:#000;color:#fff}
.np-btn.red{border-color:#900;color:#900}
.np-btn.red:hover{background:#900;color:#fff}

/* SESSION (above queue) */
#session-sec{border-bottom:1px solid #000;flex-shrink:0;padding:6px 8px;background:#fffef5}
#session-title{font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;align-items:center;gap:5px}
#session-name{font-size:11px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
#session-count{font-size:10px;color:#999}
#session-actions{display:flex;gap:4px;flex-wrap:wrap}
.sess-btn{font-family:var(--font);font-size:10px;border:1px solid #000;background:#fff;padding:3px 8px;cursor:pointer}
.sess-btn:hover{background:#000;color:#fff}
.sess-btn.primary{background:#000;color:#fff}
.sess-btn.primary:hover{background:#333}

/* QUEUE */
#queue-sec{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#queue-hdr{padding:5px 8px;border-bottom:1px solid #000;display:flex;align-items:center;font-size:11px;font-weight:bold;background:#f8f8f8;flex-shrink:0}
#queue-cnt{font-weight:normal;color:#888;font-size:10px;margin-left:5px}
#queue-list{flex:1;overflow-y:auto;padding:4px}
.qi{display:flex;align-items:center;gap:5px;padding:5px 6px;border:1px solid #000;margin-bottom:2px;cursor:pointer;font-size:12px;background:#fff;user-select:none}
.qi:hover{background:#f5f5f5}
.qi.dragging{opacity:.4}
.qi.drag-over{border-top:2px solid #000}
.qi-num{font-size:10px;color:#bbb;min-width:16px;flex-shrink:0}
.qi-dot{width:10px;height:10px;flex-shrink:0;border:1px solid rgba(0,0,0,.2)}
.qi-inf{flex:1;overflow:hidden}
.qi-title{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.qi-sub{font-size:9px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qi-rm{font-size:14px;cursor:pointer;color:#ccc;line-height:1;padding:0 2px;flex-shrink:0}
.qi-rm:hover{color:#000}
#queue-footer{border-top:1px solid #000;padding:5px;flex-shrink:0;display:flex;flex-direction:column;gap:3px}
#queue-footer button{font-family:var(--font);font-size:10px;border:1px solid #000;background:#fff;padding:3px;cursor:pointer;text-align:left}
#queue-footer button:hover{background:#000;color:#fff}

/* SETS FULL OVERLAY (legacy, keep for export etc) */
#sets-overlay{display:none;position:fixed;inset:0;background:#fff;z-index:150;flex-direction:column}
#sets-overlay.on{display:flex}
#so-hdr{border-bottom:1px solid #000;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#so-hdr h2{font-size:14px;font-weight:bold}
#so-body{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;align-content:start}
.set-card{border:1px solid #000;padding:10px;font-size:11px}
.sc-title2{font-weight:bold;font-size:13px;margin-bottom:3px}
.sc-meta{color:#777;font-size:10px;margin-bottom:4px}
.sc-keys{display:flex;gap:2px;flex-wrap:wrap;margin:4px 0}
.sc-kdot{width:10px;height:10px;border:1px solid rgba(0,0,0,.2)}
.sc-songs{display:none;border-top:1px solid #000;margin-top:6px;padding-top:6px}
.set-card.expanded .sc-songs{display:block}
.sc-song-row{display:flex;align-items:center;gap:4px;padding:3px 0;font-size:10px;border-bottom:1px solid #f0f0f0}
.sc-song-row.played{text-decoration:line-through;opacity:.45}
.played-btn{width:11px;height:11px;border:1px solid #000;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}
.played-btn:hover{background:#000;color:#fff}
.sc-actions{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.sc-btn{font-family:var(--font);font-size:10px;border:1px solid #000;background:#fff;padding:2px 6px;cursor:pointer}
.sc-btn:hover{background:#000;color:#fff}
.sc-tag{font-size:9px;border:1px solid #000;padding:1px 4px;display:inline-block;margin:1px}
.sc-notes{margin-top:6px;border-top:1px solid #eee;padding-top:5px}
.sc-notes textarea{font-family:var(--font);font-size:10px;border:1px solid #ccc;width:100%;padding:3px 5px;outline:none;resize:vertical;min-height:40px;background:#fffef5}
.sc-notes textarea:focus{border-color:#000}

/* DIALOG */
#dlg-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center}
#dlg-ov.on{display:flex}
#dlg{background:#fff;border:2px solid #000;padding:18px;min-width:300px;max-width:440px;font-family:var(--font)}
#dlg-title{font-size:12px;font-weight:bold;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
#dlg-msg{font-size:12px;margin-bottom:10px;line-height:1.6;color:#555}
#dlg-fields input,#dlg-fields textarea{font-family:var(--font);font-size:12px;border:1px solid #000;width:100%;padding:4px 8px;outline:none;margin-bottom:8px;display:block;background:#fff}
.dlg-lbl{font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;display:block;color:#555}
#dlg-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
#dlg-btns button{font-family:var(--font);font-size:11px;border:1px solid #000;background:#fff;padding:4px 14px;cursor:pointer}
#dlg-btns button:hover{background:#000;color:#fff}

/* NOTIF */
#notif{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#000;color:#fff;font-family:var(--font);font-size:12px;padding:7px 18px;border:1px solid #000;z-index:999;display:none;white-space:nowrap}

/* DARK MODE */
body.dark{background:#111;color:#ddd}
body.dark #nav{background:#111;border-color:#2a2a2a}
body.dark .nb{background:#111;color:#ddd;border-color:#444}
body.dark .nb:hover,body.dark .nb.on{background:#ddd;color:#111}
body.dark .nb.accent{background:#ddd;color:#111}
body.dark .nb.accent:hover{background:#bbb}
body.dark #nav-session{color:#666}
body.dark #match-count{color:#666}
body.dark .chip{background:#ddd;color:#111;border-color:#555}
body.dark #right-panel{background:#111;border-color:#2a2a2a}
body.dark #pp-hdr{background:#1a1a1a;border-color:#2a2a2a}
body.dark #pp-hdr:hover{background:#222}
body.dark .pp-item{border-color:#1e1e1e}
body.dark .pp-item:hover{background:#1a1a1a}
body.dark .pp-dot,.pp-meta{color:#777}
body.dark #np-lbl{background:#1a1a1a;border-color:#2a2a2a}
body.dark #np-empty{color:#555}
body.dark #np-artist{color:#888}
body.dark .np-badge{border-color:rgba(255,255,255,.2)}
body.dark .np-tag{border-color:#444;color:#bbb}
body.dark .np-tag:hover{background:#ddd;color:#111}
body.dark .np-btn{background:#111;color:#ddd;border-color:#444}
body.dark .np-btn:hover{background:#ddd;color:#111}
body.dark .np-btn.red{border-color:#c44;color:#c44}
body.dark .np-btn.red:hover{background:#c44;color:#fff}
body.dark #np-chords-btn{background:#111;color:#ddd;border-color:#444}
body.dark #np-chords-btn:hover{background:#ddd;color:#111}
body.dark #np-notes{color:#999}
body.dark #session-sec{background:#16130a;border-color:#2a2a2a}
body.dark #session-name{color:#999}
body.dark #session-count{color:#666}
body.dark .sess-btn{background:#111;color:#ddd;border-color:#444}
body.dark .sess-btn:hover{background:#ddd;color:#111}
body.dark .sess-btn.primary{background:#ddd;color:#111}
body.dark .sess-btn.primary:hover{background:#bbb}
body.dark #queue-hdr{background:#1a1a1a;border-color:#2a2a2a}
body.dark #queue-cnt{color:#666}
body.dark .qi{background:#111;border-color:#333;color:#ddd}
body.dark .qi:hover{background:#1a1a1a}
body.dark .qi-num{color:#555}
body.dark .qi-sub{color:#666}
body.dark .qi-rm{color:#444}
body.dark .qi-rm:hover{color:#ddd}
body.dark .qi.drag-over{border-top-color:#ddd}
body.dark #queue-footer{border-color:#2a2a2a}
body.dark #queue-footer button{background:#111;color:#ddd;border-color:#444}
body.dark #queue-footer button:hover{background:#ddd;color:#111}
body.dark #sets-panel{background:#111;border-color:#2a2a2a}
body.dark #sp-hdr{border-color:#2a2a2a}
body.dark .sp-set{border-color:#2a2a2a}
body.dark .sp-set-hdr{background:#1a1a1a}

<body>

<nav id="nav">
  <span id="nav-title">BILLY <span style="text-transform:lowercase;letter-spacing:0">fm</span></span>
  <span id="nav-session"></span>
  <div id="nav-center">
    <button class="nb" id="fmode-btn" onclick="toggleFilterMode()">OR</button>
    <div id="filter-chips"></div>
    <span id="match-count"></span>
  </div>
  <div id="nav-right">
    <button class="nb" onclick="openSearch()">/ SEARCH</button>
    <button class="nb" id="sp-toggle-btn" onclick="toggleSetsPanel()">SETS ▸</button>
    <button class="nb" id="dark-btn" onclick="toggleDark()" title="Dark mode">◑</button>
    <button class="nb" id="settings-btn" onclick="openSettings()" title="Settings">⚙</button>
  </div>
</nav>

<div id="enrich-bar"></div>
<div id="status-bar"></div>

<div id="search-bar">
  <span style="font-size:11px;font-weight:bold">SEARCH:</span>
  <input type="text" id="search-input" placeholder="song, artist, genre, tag..." autocomplete="off">
  <button class="nb" onclick="closeSearch()">✕</button>
</div>
<div id="search-sug"></div>

<!-- SETS SIDE PANEL -->
<div id="sets-panel">
  <div id="sp-resize"></div>
  <div id="sp-hdr">
    <h3>SETS & HISTORY</h3>
    <button class="nb" onclick="toggleSetsPanel()">✕</button>
  </div>
  <div id="sp-body"></div>
  <div class="sp-copy-bar" id="sp-copy-bar">
    <span id="sp-sel-count" style="font-size:10px;flex:1"></span>
    <button class="nb" onclick="copySelectedToQueue()">COPY TO QUEUE</button>
    <button class="nb" onclick="clearSpSelection()">✕</button>
  </div>
</div>

<!-- FILTER PANEL -->
<div id="filter-panel">
  <div class="fp-sec">
    <div class="fp-hd">Selected Song</div>
    <div id="fp-selected" class="fp-info">—</div>
  </div>
  <div class="fp-sec">
    <div class="fp-hd">Match Filters</div>
    <label class="fp-row"><input type="checkbox" id="flt-key" onchange="applyFilters()"> Same key / relative</label>
    <label class="fp-row"><input type="checkbox" id="flt-bpm" onchange="applyFilters()"> BPM ±15</label>
    <label class="fp-row"><input type="checkbox" id="flt-theme" onchange="applyFilters()"> Same theme tags</label>
    <label class="fp-row"><input type="checkbox" id="flt-word" onchange="applyFilters()"> Same first word</label>
    <label class="fp-row"><input type="checkbox" id="flt-era" onchange="applyFilters()"> Same era</label>
    <label class="fp-row"><input type="checkbox" id="flt-artist" onchange="applyFilters()"> Same artist</label>
    <label class="fp-row"><input type="checkbox" id="flt-genre" onchange="applyFilters()"> Same genre</label>
  </div>
  <div class="fp-sec">
    <div class="fp-hd">Play Frequency</div>
    <label class="fp-row"><input type="checkbox" id="flt-unplayed" onchange="applyFilters()"> Not played recently</label>
  </div>
  <div class="fp-sec"><div id="fp-info" class="fp-info"></div></div>
</div>

<!-- chord panel kept for legacy CSS refs; not used for display anymore -->

<!-- MAIN -->
<div id="main">
  <div id="grid-area">
    <div id="controls">
      <span style="font-size:11px;font-weight:500">Sort:</span>
      <select id="sort-select" onchange="setSortBy(this.value)">
        <option value="random">Random</option>
        <option value="title">Alphabetical</option>
        <option value="artist">Artist A–Z</option>
        <option value="key">Key</option>
        <option value="bpm">BPM</option>
        <option value="era">Era</option>
        <option value="theme-proximity">Theme Proximity</option>
        <option value="most-played">Most Played</option>
        <option value="least-played">Least Played</option>
      </select>
      <button class="nb" id="reshuffle-btn" onclick="setSortBy('random')" title="Reshuffle" style="display:none">↻ shuffle</button>
    </div>
    <div id="error-banner"></div>
    <div id="skeleton"></div>
    <div id="song-grid" style="display:none"></div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div id="right-panel">
  <div id="rp-resize"></div>

  <div id="pp-sec">
    <div id="pp-hdr" onclick="togglePP()">
      <span>PREVIOUSLY PLAYED</span>
      <span id="pp-cnt"></span>
      <span id="pp-toggle">▼</span>
      <button id="pp-clr" onclick="clearHistory(event)">CLEAR</button>
    </div>
    <div id="pp-list"></div>
  </div>

  <div id="np-sec">
    <div id="np-lbl">NOW PLAYING</div>
    <div id="np-content">
      <div id="np-empty">— nothing playing —</div>
      <div id="np-song">
        <div id="np-title"></div>
        <div id="np-artist"></div>
        <div id="np-meta"></div>
        <button id="np-chords-btn" onclick="openChordPanel()"></button>
        <div id="np-notes"></div>
        <div id="np-actions">
          <button class="np-btn" onclick="clearNP()">CLEAR</button>
          <button class="np-btn red" onclick="clearNPData()">CLEAR DATA</button>
        </div>
      </div>
    </div>
  </div>

  <div id="session-sec">
    <div id="session-title">
      <span style="font-size:9px;font-weight:bold;text-transform:uppercase;letter-spacing:.5px">Current Set:</span>
      <span id="session-name">—</span>
      <span id="session-count"></span>
    </div>
    <div id="session-actions">
      <button class="sess-btn primary" onclick="newSession()">NEW SET</button>
      <button class="sess-btn" onclick="saveSession()">SAVE SET</button>
      <button class="sess-btn" onclick="clearSession()">CLEAR SET</button>
    </div>
  </div>

  <div id="queue-sec">
    <div id="queue-hdr">QUEUE<span id="queue-cnt"></span></div>
    <div id="queue-list"></div>
    <div id="queue-footer">
      <button onclick="clearQueue()">CLEAR QUEUE</button>
    </div>
  </div>
</div>

<!-- SETS FULL OVERLAY -->
<div id="sets-overlay">
  <div id="so-hdr">
    <h2>ALL SETS</h2>
    <button class="nb" onclick="document.getElementById('sets-overlay').classList.remove('on')">✕ CLOSE</button>
    <button class="nb" style="margin-left:auto" onclick="exportAllSets()">EXPORT ALL</button>
  </div>
  <div id="so-body"></div>
</div>

<div id="dlg-ov">
  <div id="dlg">
    <div id="dlg-title"></div>
    <div id="dlg-msg"></div>
    <div id="dlg-fields"></div>
    <div id="dlg-btns">
      <button onclick="dlgCancel()">Cancel</button>
      <button onclick="dlgOK()">OK</button>
    </div>
  </div>
</div>
<div id="notif"></div>

// COLOR

function keyColor(key) {
  const k = normKey(key);
  const hsl = KEY_HSL[k];
  if (!hsl) return ['#888','#fff'];
  const [h,s,l] = hsl;
  return [`hsl(${h},${s}%,${l}%)`, l<50?'#fff':'#000'];
}
function normKey(key) {
  if (!key) return '';
  const k = key.trim();
  if (KEY_HSL[k]) return k;
  const c = k[0].toUpperCase()+k.slice(1);
  if (KEY_HSL[c]) return c;
  const ns = k.replace(/\s/g,'');
  if (KEY_HSL[ns]) return ns;
  const nsc = ns[0].toUpperCase()+ns.slice(1);
  if (KEY_HSL[nsc]) return nsc;
  return k;
}

// ═══════════════════════════════════════════════
// CSV PARSER
// ═══════════════════════════════════════════════
function parseCSV(text) {
  const rows = [];
  for (const rawLine of text.split(/\r?\n/)) {
    if (!rawLine.trim()) continue;
    const row = []; let field='', inQ=false;
    for (let i=0; i<rawLine.length; i++) {
      const ch = rawLine[i];
      if (inQ) {
        if (ch==='"' && rawLine[i+1]==='"') { field+='"'; i++; }
        else if (ch==='"') inQ=false;
        else field+=ch;
      } else {
        if (ch==='"') inQ=true;
        else if (ch===',') { row.push(field.trim()); field=''; }
        else field+=ch;
      }
    }
    row.push(field.trim());
    rows.push(row);
  }
  return rows;
}

function rowsToSongs(rows) {
  if (rows.length < 2) return [];
  const hdr = rows[0].map(h => (h||'').trim().toUpperCase().replace(/\s+/g,' '));
  let songC=-1, artistC=-1, keyC=-1, chordsC=-1;
  const notesC = [];
  hdr.forEach((h,i) => {
    if (songC<0 && (h==='SONG'||h==='TITLE'||h==='SONG TITLE'||h==='NAME')) songC=i;
    if (artistC<0 && h==='ARTIST') artistC=i;
    if (keyC<0 && h==='KEY') keyC=i;
    if (chordsC<0 && (h==='CHORDS'||h==='CHORD')) chordsC=i;
    if (h.startsWith('NOTES')||h==='NOTE') notesC.push(i);
  });
  // Fallback: if headers not found, detect checkbox offset
  if (songC<0) {
    const f0 = (rows[1]?.[0]||'').trim().toUpperCase();
    const off = (f0==='TRUE'||f0==='FALSE'||f0==='') ? 1 : 0;
    songC=off; artistC=off+1; keyC=off+2; chordsC=off+3;
    if (!notesC.length) { notesC.push(off+4); notesC.push(off+5); }
  }
  const songs = [];
  for (let i=1; i<rows.length; i++) {
    const r = rows[i];
    const title = (r[songC]||'').trim();
    if (!title || title.toUpperCase()==='TRUE' || title.toUpperCase()==='FALSE') continue;
    songs.push({
      id: (title+'|||'+(r[artistC]||'')).toLowerCase().replace(/\W+/g,'-').slice(0,60),
      title, artist:(r[artistC]||'').trim(), key:(r[keyC]||'').trim(),
      chords:(r[chordsC]||'').trim(),
      notes1:(r[notesC[0]]||'').trim(), notes2:(r[notesC[1]]||'').trim(),
      bpm:null, tags:[], genre:[], era:null, firstWord:null,
    });
  }
  return songs;
}

// ═══════════════════════════════════════════════
// ENRICHMENT
// ═══════════════════════════════════════════════
function getEra(artist) {
  if (!artist) return null;
  if (ARTIST_DECADE[artist]) return ARTIST_DECADE[artist];
  const al = artist.toLowerCase();
  for (const [k,v] of Object.entries(ARTIST_DECADE)) if (k.toLowerCase()===al) return v;
  return null;
}
function getGenre(artist) {
  if (!artist) return [];
  if (ARTIST_GENRE[artist]) return ARTIST_GENRE[artist];
  const al = artist.toLowerCase();
  for (const [k,v] of Object.entries(ARTIST_GENRE)) if (k.toLowerCase()===al) return v;
  return [];
}
function getFirstWord(title) {
  return (title||'').trim().replace(/^(a|an|the)\s+/i,'').split(/[\s\-]/)[0].toLowerCase().replace(/[^a-z0-9]/g,'');
}
function classifyTags(title, artist) {
  const text = (title+' '+artist).toLowerCase();
  const scores = {};
  for (const [theme, kws] of Object.entries(THEME_KW)) {
    let s=0; for (const kw of kws) if (text.includes(kw)) s++;
    if (s>0) scores[theme]=s;
  }
  const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
  return sorted.length ? sorted : ['love'];
}
function lookupBPM(title, artist) {
  const k1=`${title}|${artist}`;
  if (BPM_TABLE[k1]) return BPM_TABLE[k1];
  const tl=title.toLowerCase();
  for (const [k,v] of Object.entries(BPM_TABLE)) if (k.split('|')[0].toLowerCase()===tl) return v;
  return null;
}
function slugify(s) { return s.toLowerCase().replace(/['']/g,'').replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-'); }

async function fetchBPM(title, artist) {
  const cache = LS.get('bfm_bpm') || {};
  const ck = `${title}|${artist}`;
  if (cache[ck] !== undefined) return cache[ck];
  const local = lookupBPM(title, artist);
  if (local) { cache[ck]=local; LS.set('bfm_bpm',cache); return local; }
  try {
    const url = `https://songbpm.com/@${slugify(artist)}/${slugify(title)}`;
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
      { signal: AbortSignal.timeout(5000) });
    if (r.ok) {
      const html = (await r.json()).contents || '';
      const m = html.match(/"bpm"\s*[:\s]+(\d+)/) || html.match(/(\d{2,3})\s*BPM/i);
      if (m) { const bpm=parseInt(m[1]); if (bpm>40&&bpm<300) { cache[ck]=bpm; LS.set('bfm_bpm',cache); return bpm; } }
    }
  } catch {}
  cache[ck]=null; LS.set('bfm_bpm',cache); return null;
}

async function enrichSongs(songs) {
  const total = songs.length;
  for (const s of songs) {
    s.era = getEra(s.artist);
    s.genre = getGenre(s.artist);
    s.firstWord = getFirstWord(s.title);
    s.tags = classifyTags(s.title, s.artist);
  }
  let done = 0;
  for (let i=0; i<songs.length; i+=4) {
    await Promise.all(songs.slice(i,i+4).map(async s => {
      s.bpm = await fetchBPM(s.title, s.artist);
      done++;
      document.getElementById('enrich-bar').style.width = Math.round(done/total*100)+'%';
      setStatus(`Enriching ${done}/${total}...`);
    }));
  }
  document.getElementById('enrich-bar').style.width='100%';
  setTimeout(()=>{ document.getElementById('enrich-bar').style.width='0'; },600);
  clearStatus();
  await enrichLastfm(songs);
  return songs;
}

// ═══════════════════════════════════════════════
// LAST.FM ENRICHMENT
// ═══════════════════════════════════════════════
function lfmTitleCase(s) {
  return s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
}
async function fetchLastfmTags(title, artist) {
  const apiKey = LS.get('bfm_lfm_key');
  if (!apiKey) return null;
  const cache = LS.get('bfm_lfm') || {};
  const ck = `${title}|${artist}`;
  if (cache[ck] !== undefined) return cache[ck];
  try {
    const url = `https://ws.audioscrobbler.com/2.0/?method=track.getTopTags&artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(title)}&api_key=${encodeURIComponent(apiKey)}&format=json`;
    const r = await fetch(url, { signal: AbortSignal.timeout(6000) });
    if (!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    if (data?.error) throw new Error(data.message||'Last.fm error');
    const topTags = (data?.toptags?.tag || []).slice(0, 20);
    const result = { genre: [], themes: [] };
    for (const tag of topTags) {
      const name = (tag.name || '').toLowerCase().trim();
      if (!name) continue;
      if (LASTFM_GENRES.has(name)) {
        const normalized = lfmTitleCase(name);
        if (!result.genre.includes(normalized)) result.genre.push(normalized);
      }
      if (LASTFM_THEME_MAP[name]) {
        const theme = LASTFM_THEME_MAP[name];
        if (!result.themes.includes(theme)) result.themes.push(theme);
      }
    }
    cache[ck] = result;
    LS.set('bfm_lfm', cache);
    return result;
  } catch {
    cache[ck] = null;
    LS.set('bfm_lfm', cache);
    return null;
  }
}
async function enrichLastfm(songs) {
  const apiKey = LS.get('bfm_lfm_key');
  if (!apiKey) return;
  const total = songs.length;
  let done = 0;
  for (let i = 0; i < songs.length; i += 4) {
    await Promise.all(songs.slice(i, i+4).map(async s => {
      const result = await fetchLastfmTags(s.title, s.artist);
      if (result) {
        for (const g of result.genre) if (!s.genre.includes(g)) s.genre.push(g);
        for (const t of result.themes) if (!s.tags.includes(t)) s.tags.push(t);
      }
      done++;
      document.getElementById('enrich-bar').style.width = Math.round(done/total*100)+'%';
      setStatus(`Last.fm tags: ${done}/${total}...`);
    }));
  }
  document.getElementById('enrich-bar').style.width = '100%';
  setTimeout(() => { document.getElementById('enrich-bar').style.width = '0'; }, 600);
  clearStatus();
}

// ═══════════════════════════════════════════════
// SHUFFLE
// ═══════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ═══════════════════════════════════════════════
// THEME PROXIMITY SORT (greedy nearest-neighbor)
// ═══════════════════════════════════════════════
function tagOverlap(a, b) {
  const ta = new Set([...(a.tags||[]),...(a.genre||[])]);
  const tb = new Set([...(b.tags||[]),...(b.genre||[])]);
  let n=0; for (const t of ta) if (tb.has(t)) n++;
  return n;
}
function proximitySort(songs) {
  if (songs.length<=1) return songs;
  const result = [songs[0]];
  const rem = songs.slice(1);
  while (rem.length) {
    const last = result[result.length-1];
    let bi=0, bs=-1;
    for (let i=0; i<rem.length; i++) {
      const sc = tagOverlap(last, rem[i]);
      if (sc>bs) { bs=sc; bi=i; }
    }
    result.push(rem.splice(bi,1)[0]);
  }
  return result;
}

// DATA LOAD
// ═══════════════════════════════════════════════
async function loadData(force=false) {
  showSkeleton();
  const cached = LS.get('bfm_songs');
  if (cached && !force) {
    S.songs = cached;
    S.shuffleOrder = shuffle(S.songs.map(s=>s.id));
    hideSkeleton(); renderGrid(); updateSongCount();
    const needEnrich = S.songs.some(s=>!s.genre||s.bpm===undefined);
    if (needEnrich) {
      S.songs = await enrichSongs(S.songs); LS.set('bfm_songs',S.songs); renderGrid();
    } else if (LS.get('bfm_lfm_key')) {
      await enrichLastfm(S.songs); LS.set('bfm_songs',S.songs); renderGrid();
    }
    return;
  }
  try {
    setStatus('Fetching...');
    const resp = await fetch(CSV_URL+'&_='+Date.now());
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    const text = await resp.text();
    const rows = parseCSV(text);
    const songs = rowsToSongs(rows);
    if (!songs.length) throw new Error('No songs found — check CSV');
    S.songs = songs;
    S.shuffleOrder = shuffle(S.songs.map(s=>s.id));
    hideSkeleton(); renderGrid(); updateSongCount();
    S.songs = await enrichSongs(S.songs);
    LS.set('bfm_songs',S.songs);
    renderGrid(); hideError();
  } catch(err) {
    hideSkeleton();
    const c = LS.get('bfm_songs');
    if (c) { S.songs=c; S.shuffleOrder=shuffle(S.songs.map(s=>s.id)); renderGrid(); showError('⚠ Refresh failed — cached. '+err.message); }
    else showError('⚠ Load failed: '+err.message);
    clearStatus();
  }
}
async function refreshData() {
  LS.del('bfm_songs');
  S.selectedSong=null; clearFilterPanel();
  await loadData(true);
  notify('Refreshed');
}

function showSkeleton() {
  document.getElementById('skeleton').innerHTML = Array.from({length:50},()=>'<div class="skel"></div>').join('');
  document.getElementById('song-grid').style.display='none';
}
function hideSkeleton() {
  document.getElementById('skeleton').innerHTML='';
  document.getElementById('song-grid').style.display='grid';
}
function getSorted() {
  const songs = [...S.songs];
  const h = S.playHistory;
  const countOf = id => h.filter(e=>e.songId===id).length;
  switch(S.sortBy) {
    case 'random':
      const order = S.shuffleOrder;
      return songs.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
    case 'title':   return songs.sort((a,b)=>a.title.localeCompare(b.title));
    case 'artist':  return songs.sort((a,b)=>a.artist.localeCompare(b.artist)||a.title.localeCompare(b.title));
    case 'key':     return songs.sort((a,b)=>(a.key||'').localeCompare(b.key||'')||a.title.localeCompare(b.title));
    case 'bpm':     return songs.sort((a,b)=>(a.bpm||0)-(b.bpm||0));
    case 'era':     return songs.sort((a,b)=>(a.era||'zzz').localeCompare(b.era||'zzz')||a.title.localeCompare(b.title));
    case 'theme-proximity': return proximitySort(songs);
    case 'most-played':   return songs.sort((a,b)=>countOf(b.id)-countOf(a.id));
    case 'least-played':  return songs.sort((a,b)=>countOf(a.id)-countOf(b.id));
    default: return songs.sort((a,b)=>a.title.localeCompare(b.title));
  }
}
function renderGrid() {
  const grid = document.getElementById('song-grid');
  grid.innerHTML = '';
  for (const song of getSorted()) {
    const [bg,fg] = keyColor(song.key);
    const el = document.createElement('div');
    el.className = 'sc';
    el.dataset.id = song.id;
    el.style.background = bg;
    el.style.color = fg;
    if (S.nowPlaying?.id === song.id) el.classList.add('now-playing-cell');
    else if (S.selectedSong?.id === song.id) el.classList.add('selected-cell');
    el.innerHTML = `<div>
      <div class="sc-title">${esc(song.title)}</div>
      <div class="sc-artist">${esc(song.artist)}</div>
    </div>
    <div class="sc-foot">
      <span class="sc-key-lbl">${esc(song.key||'?')}</span>
      ${song.bpm?`<span class="sc-bpm">${song.bpm}</span>`:''}
    </div>`;
    const qbtn = document.createElement('button');
    qbtn.className = 'sc-qbtn';
    qbtn.textContent = '+';
    qbtn.title = 'Add to queue';
    qbtn.addEventListener('click', e => { e.stopPropagation(); addToQueue(song); });
    el.appendChild(qbtn);
    el.addEventListener('click', ()=>selectSong(song));
    el.addEventListener('dblclick', e=>{ e.preventDefault(); playSong(song); });
    grid.appendChild(el);
  }
  applyFilters();
}
function updateSongCount() {
  document.getElementById('nav-session').textContent = S.session ? `— ${S.session.title}` : '';
}
function setSortBy(v) {
  S.sortBy = v;
  if (v==='random') S.shuffleOrder = shuffle(S.songs.map(s=>s.id));
  document.getElementById('sort-select').value = v;
  document.getElementById('reshuffle-btn').style.display = v==='random' ? '' : 'none';
  renderGrid();
}

function startSession(title) {
  S.session = { id: Date.now()+'', title: title||sessionDateTitle(), startTime: Date.now(), notes:'' };
  renderSessionUI();
  LS.set('bfm_session', S.session);
}
function renderSessionUI() {
  const s = S.session;
  document.getElementById('session-name').textContent = s ? s.title : '—';
  if (s) {
    const played = S.playHistory.filter(e=>e.timestamp>=s.startTime);
    const unique = [...new Set(played.map(e=>e.songId))];
    document.getElementById('session-count').textContent = `(${unique.length} played)`;
  } else {
    document.getElementById('session-count').textContent = '';
  }
  document.getElementById('nav-session').textContent = s ? `— ${s.title}` : '';
}
function newSession() {
  const doNew = () => {
    // Offer to save current if songs played
    const hasContent = S.nowPlaying || S.queue.length || (S.session && S.playHistory.some(e=>e.timestamp>=(S.session?.startTime||0)));
    if (hasContent) {
      showDialog('Save current set first?', 'Save before starting a new set?', [], () => {
        saveSession(true);
        _startNewSession();
      }, 'Skip & Start New', () => _startNewSession());
    } else {
      _startNewSession();
    }
  };
  doNew();
}
function _startNewSession() {
  startSession(sessionDateTitle());
  clearNP();
  S.queue = [];
  saveQueue();
  renderQueue();
  notify('New session started: '+S.session.title);
}
function saveSession(silent=false) {
  if (!S.session) startSession();
  // Gather: unique songs played this session
  const played = S.playHistory.filter(e=>e.timestamp>=S.session.startTime);
  const seen = new Set();
  const songs = [];
  for (const ev of played) {
    if (!seen.has(ev.songId)) {
      seen.add(ev.songId);
      const s = S.songs.find(x=>x.id===ev.songId);
      if (s) songs.push(s);
    }
  }
  // Add now playing if not already there
  if (S.nowPlaying && !seen.has(S.nowPlaying.id)) songs.push(S.nowPlaying);
  // Add queue items
  for (const s of S.queue) if (!seen.has(s.id)) { seen.add(s.id); songs.push(s); }

  if (!songs.length && !silent) { notify('Nothing to save yet'); return; }

  const set = {
    id: S.session.id,
    title: S.session.title,
    tags: [],
    date: new Date().toLocaleDateString(),
    songs,
    played: [],
    notes: S.session.notes || '',
  };
  // Update or insert
  const idx = S.savedSets.findIndex(x=>x.id===set.id);
  if (idx>=0) S.savedSets[idx] = set;
  else S.savedSets.unshift(set);
  saveSets();
  renderSetsPanel();
  if (!silent) notify(`"${set.title}" saved (${songs.length} songs)`);
}
function clearSession() {
  showDialog('Clear current set?', 'This clears Now Playing, Queue, and session tracking. Play history data is kept.', [], () => {
    clearNP();
    S.queue = []; saveQueue(); renderQueue();
    startSession(sessionDateTitle());
    notify('Session cleared');
  });
}

function selectSong(song) {

// Helpers called from filter panel buttons (inline onclick scope)
function fpAddToQueue() { if (S.selectedSong) addToQueue(S.selectedSong); }
function fpPlayNow() { if (S.selectedSong) playSong(S.selectedSong); }

function playSong(song) {
  // Remove from queue if there
  const qi = S.queue.findIndex(q=>q.id===song.id);
  if (qi!==-1) { S.queue.splice(qi,1); saveQueue(); renderQueue(); }

  // Deferred history: add previous NP to history when next song starts
  if (S.nowPlaying && S.nowPlaying.id !== song.id) {
    const prev = S.nowPlaying;
    S.playHistory.push({songId:prev.id,title:prev.title,artist:prev.artist,key:prev.key,timestamp:Date.now()});
    LS.set('bfm_history',S.playHistory);
  }

  S.nowPlaying = song;

  document.querySelectorAll('.sc.now-playing-cell').forEach(e=>e.classList.remove('now-playing-cell'));
  const cell = document.querySelector(`.sc[data-id="${CSS.escape(song.id)}"]`);
  if (cell) cell.classList.add('now-playing-cell');

  renderNP();
  renderPP();
  renderSessionUI();
  selectSong(song);
}
function renderNP() {
  const s = S.nowPlaying;
  document.getElementById('np-empty').style.display = s ? 'none' : 'block';
  document.getElementById('np-song').style.display = s ? 'block' : 'none';
  if (!s) return;
  const [bg,fg] = keyColor(s.key);
  document.getElementById('np-title').textContent = s.title;
  document.getElementById('np-artist').textContent = s.artist;

  let meta = `<span class="np-badge" style="background:${bg};color:${fg}">${esc(s.key||'?')}</span>`;
  if (s.bpm) meta += `<span style="font-size:11px"> ${s.bpm} BPM</span>`;
  if (s.era) meta += `<span style="font-size:11px;color:#888"> ${s.era}</span>`;
  if (s.genre?.length) meta += s.genre.map(g=>`<span class="np-tag">${esc(g)}</span>`).join('');
  if (s.tags?.length) meta += s.tags.map(t=>`<span class="np-tag" onclick="activateTagFilter()">${esc(t)}</span>`).join('');
  document.getElementById('np-meta').innerHTML = meta;

  // Chord/URL detection
  S.chordUrl = '';
  const isUrl = u => /^https?:\/\//i.test(u||'');
  const chordSrc = isUrl(s.chords) ? s.chords : (isUrl(s.notes1)?s.notes1:(isUrl(s.notes2)?s.notes2:''));
  const chordTxt = !isUrl(s.chords) && s.chords ? s.chords : '';
  const cb = document.getElementById('np-chords-btn');
  if (chordSrc) {
    S.chordUrl = chordSrc;
    cb.textContent = 'CHORDS ↗';
    cb.style.display = 'block';
    cb.onclick = openChordPanel;
  } else if (chordTxt) {
    cb.textContent = `CHORDS: ${chordTxt}`;
    cb.style.display = 'block';
    cb.onclick = null;
  } else {
    cb.style.display = 'none';
  }

  const notes = [s.notes1,s.notes2].filter(n=>n&&!isUrl(n)).join('\n');
  const notesEl = document.getElementById('np-notes');
  notesEl.textContent = notes;
  notesEl.style.display = notes ? 'block' : 'none';
}
function clearNP() {
  document.querySelectorAll('.sc.now-playing-cell').forEach(e=>e.classList.remove('now-playing-cell'));

function renderPP() {
  const list = document.getElementById('pp-list');
  const h = S.playHistory;
  document.getElementById('pp-cnt').textContent = `(${h.length})`;
  list.innerHTML = '';
  // Show oldest first so list reads like a setlist (top=first played)
  [...h].reverse().forEach((ev, displayIdx) => {
    const origIdx = h.length - 1 - displayIdx;
    const [bg] = keyColor(ev.key);
    const el = document.createElement('div');
    el.className = 'pp-item';
    el.innerHTML = `
      <span style="font-size:9px;color:#bbb;min-width:16px;flex-shrink:0">${h.length - displayIdx}</span>
      <span class="pp-dot" style="background:${bg}"></span>
      <div class="pp-inf">
        <div class="pp-title">${esc(ev.title)}</div>
        <div class="pp-meta">${esc(ev.artist)} · ${timeAgo(ev.timestamp)}</div>
      </div>
      <span class="pp-rm" onclick="event.stopPropagation();removePPItem(${origIdx})">✕</span>`;
    el.addEventListener('click', ()=>{ const s=S.songs.find(x=>x.id===ev.songId); if(s) selectSong(s); });
    el.addEventListener('dblclick', e=>{ e.preventDefault(); const s=S.songs.find(x=>x.id===ev.songId); if(s) playSong(s); });
    list.appendChild(el);
  });
  // Auto-scroll to bottom (most recent)
  list.scrollTop = list.scrollHeight;
}
function removePPItem(idx) { S.playHistory.splice(idx,1); LS.set('bfm_history',S.playHistory); renderPP(); }
function clearHistory(e) {
  e.stopPropagation();
  showDialog('Clear play history?','This removes all previously played data.',[],()=>{
    S.playHistory=[]; LS.set('bfm_history',[]); renderPP(); renderSessionUI(); notify('History cleared');
  });
}
function togglePP() {
  S.ppCollapsed = !S.ppCollapsed;
  document.getElementById('pp-sec').classList.toggle('collapsed',S.ppCollapsed);

function timeAgo(ts) {
  const d=Date.now()-ts;
  if(d<60000) return 'just now';
  if(d<3600000) return Math.floor(d/60000)+'m ago';
  if(d<86400000) return Math.floor(d/3600000)+'h ago';
  return Math.floor(d/86400000)+'d ago';
}

     <div class="fp-actions">

function applyFilters() {
  const s = S.selectedSong;
  const now7d = Date.now() - 7*86400000;
  const anyActive = Object.values(S.filters).some(v=>v);

  let matchCount = 0;
  document.querySelectorAll('.sc').forEach(el => {
    const song = S.songs.find(x=>x.id===el.dataset.id);
    if (!song) return;

    if (S.searchQuery) {
      const q = S.searchQuery.toLowerCase();
      const m = song.title.toLowerCase().includes(q) ||
        song.artist.toLowerCase().includes(q) ||
        (song.genre||[]).some(g=>g.toLowerCase().includes(q)) ||
        (song.tags||[]).some(t=>t.toLowerCase().includes(q));
      el.classList.toggle('faded',!m);
      return;
    }

    if (!anyActive) { el.classList.remove('faded'); return; }
    if (song.id === s?.id) { el.classList.remove('faded'); return; }

    const checks = [];
    const rel = RELATIVE_MAP[s?.key||'']||null;
    if (S.filters.key && s)     checks.push(song.key===s.key||(rel&&song.key===rel));
    if (S.filters.bpm && s)     checks.push(s.bpm!=null&&song.bpm!=null&&Math.abs(song.bpm-s.bpm)<=15);
    if (S.filters.theme && s)   checks.push(s.tags&&song.tags&&s.tags.some(t=>song.tags.includes(t)));
    if (S.filters.word && s)    checks.push(s.firstWord&&song.firstWord&&s.firstWord===song.firstWord&&s.firstWord.length>0);
    if (S.filters.era && s)     checks.push(s.era&&song.era&&s.era===song.era);
    if (S.filters.artist && s)  checks.push(s.artist&&s.artist.toLowerCase()===song.artist.toLowerCase());
    if (S.filters.genre && s)   checks.push(s.genre&&song.genre&&s.genre.some(g=>song.genre.includes(g)));
    if (S.filters.unplayed) {
      const ev = S.playHistory.filter(e=>e.songId===song.id);
      const last = ev.length ? Math.max(...ev.map(e=>e.timestamp)) : 0;
      checks.push(!last||last<now7d);
    }

    const matches = S.filterMode==='AND' ? (checks.length>0&&checks.every(v=>v)) : checks.some(v=>v);
    el.classList.toggle('faded',!matches);
    if (matches) matchCount++;
  });

  if (anyActive) document.getElementById('match-count').textContent = `${matchCount} match${matchCount!==1?'es':''}`;
  else document.getElementById('match-count').textContent = '';
  updateFilterChips();
}
function toggleFilterMode() {
  S.filterMode = S.filterMode==='OR'?'AND':'OR';
  const btn = document.getElementById('fmode-btn');
  btn.textContent = S.filterMode;
  btn.classList.toggle('on', S.filterMode==='AND');
  applyFilters();
}
function updateFilterChips() {
  const c = document.getElementById('filter-chips'); c.innerHTML='';
  const labels={key:'Key',bpm:'BPM±15',theme:'Theme',word:'1stWord',era:'Era',artist:'Artist',genre:'Genre',unplayed:'!Recent'};
  for (const [k,on] of Object.entries(S.filters)) {
    if (!on) continue;
    const chip = document.createElement('span');
    chip.className='chip';
    chip.innerHTML=`${labels[k]} <span>✕</span>`;
    chip.onclick=()=>{ S.filters[k]=false; document.getElementById('flt-'+k).checked=false; applyFilters(); };
    c.appendChild(chip);
  }
}

function addToQueue(song) {
  if (S.queue.some(q=>q.id===song.id)) { notify('Already in queue'); return; }
  S.queue.push(song);
  saveQueue(); renderQueue();
  notify(`"${song.title}" → queue`);
}
function removeFromQueue(idx) { S.queue.splice(idx,1); saveQueue(); renderQueue(); }
function clearQueue() {
  if (!S.queue.length) return;
  showDialog('Clear queue?','',[],()=>{ S.queue=[]; saveQueue(); renderQueue(); notify('Queue cleared'); });
}
function saveQueue() { LS.set('bfm_queue',S.queue); }
function loadQueue() { S.queue=LS.get('bfm_queue')||[]; }
function renderQueue() {
  const list = document.getElementById('queue-list');
  list.innerHTML='';
  document.getElementById('queue-cnt').textContent=` (${S.queue.length})`;
  S.queue.forEach((song,idx)=>{
    const [bg]=keyColor(song.key);
    const el=document.createElement('div');
    el.className='qi'; el.draggable=true; el.dataset.idx=idx;
    el.innerHTML=`
      <span class="qi-num">${idx+1}</span>
      <span class="qi-dot" style="background:${bg}"></span>
      <div class="qi-inf">
        <div class="qi-title">${esc(song.title)}</div>
        <div class="qi-sub">${esc(song.artist)}${song.key?' · '+esc(song.key):''}${song.bpm?' · '+song.bpm:''}</div>
      </div>
      <span class="qi-rm" onclick="event.stopPropagation();removeFromQueue(${idx})">✕</span>`;
    el.addEventListener('click',()=>playSong(song));
    el.addEventListener('dragstart',qDs); el.addEventListener('dragover',qDo);
    el.addEventListener('drop',qDd); el.addEventListener('dragend',qDe);
    list.appendChild(el);
  });
}
let _di=null;
function qDs(e){_di=+e.currentTarget.dataset.idx;e.currentTarget.classList.add('dragging');}
function qDo(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function qDe(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.qi').forEach(x=>x.classList.remove('drag-over'));}
function qDd(e){
  e.preventDefault();const ti=+e.currentTarget.dataset.idx;
  if(_di===null||_di===ti)return;
  S.queue.splice(ti,0,S.queue.splice(_di,1)[0]);
  saveQueue();renderQueue();_di=null;
}

}
function clearSpSelection() {
  S.spSelected.clear();
  document.querySelectorAll('.sp-cb:checked').forEach(cb=>{ cb.checked=false; });
  document.getElementById('sp-copy-bar').classList.remove('on');
}

// ═══════════════════════════════════════════════
// SAVED SETS
// ═══════════════════════════════════════════════
function saveSets() { LS.set('bfm_sets',S.savedSets); }
function loadSets() { S.savedSets=LS.get('bfm_sets')||[]; }
function exportAllSets() {
  const txt=S.savedSets.map(set=>
    `${set.title}\n${'─'.repeat(40)}\n`+
    set.songs.map((s,i)=>`${i+1}. ${s.title} — ${s.artist} (${s.key||'?'}${s.bpm?', '+s.bpm+' BPM':''})`).join('\n')+
    (set.notes?'\n\nNotes:\n'+set.notes:'')
  ).join('\n\n');
  copyToClipboard(txt||'No sets.');
  notify('Copied to clipboard');
}

// ═══════════════════════════════════════════════
// DIALOG (supports 2-button variant for new session)
// ═══════════════════════════════════════════════
function showDialog(title, msg, fields, okCb, okLabel, altCb, altLabel) {
  document.getElementById('dlg-title').textContent = title;
  const msgEl = document.getElementById('dlg-msg');
  msgEl.textContent = msg||''; msgEl.style.display = msg?'block':'none';
  const fe = document.getElementById('dlg-fields');
  fe.innerHTML = fields.map(f=>`<label class="dlg-lbl">${esc(f.label)}</label>
    <input type="text" id="${f.id}" placeholder="${esc(f.placeholder||'')}" value="${esc(f.value||'')}">`)
    .join('');
  S.dialogCb = okCb;
  const btns = document.getElementById('dlg-btns');
  btns.innerHTML = '';
  if (altCb) {
    const altBtn = document.createElement('button');
    altBtn.textContent = altLabel||'Skip';
    altBtn.onclick = ()=>{ document.getElementById('dlg-ov').classList.remove('on'); altCb(); };
    btns.appendChild(altBtn);
  }
  const cancelBtn = document.createElement('button'); cancelBtn.textContent='Cancel'; cancelBtn.onclick=dlgCancel; btns.appendChild(cancelBtn);
  const okBtn = document.createElement('button'); okBtn.textContent=okLabel||'OK'; okBtn.onclick=dlgOK; btns.appendChild(okBtn);
  document.getElementById('dlg-ov').classList.add('on');
  const first = fe.querySelector('input');
  if (first) setTimeout(()=>first.focus(),50);
}
function dlgOK() {
  const r = S.dialogCb&&S.dialogCb();
  if (r===false) return;
  document.getElementById('dlg-ov').classList.remove('on'); S.dialogCb=null;
}
function dlgCancel() { document.getElementById('dlg-ov').classList.remove('on'); S.dialogCb=null; }

// ═══════════════════════════════════════════════
// RESIZE HANDLES
// ═══════════════════════════════════════════════
function initResizes() {
  // Right panel
  const rr=document.getElementById('rp-resize');
  let drag=false,sx,sw;
  rr.addEventListener('mousedown',e=>{drag=true;sx=e.clientX;sw=S.rpWidth;e.preventDefault();});
  document.addEventListener('mousemove',e=>{
    if(!drag)return;
    S.rpWidth=Math.max(220,Math.min(600,sw+(sx-e.clientX)));
    document.documentElement.style.setProperty('--rp',S.rpWidth+'px');
  });
  document.addEventListener('mouseup',()=>drag=false);

  // Sets panel
  const sr=document.getElementById('sp-resize');
  let drag2=false,sx2,sw2;
  sr.addEventListener('mousedown',e=>{drag2=true;sx2=e.clientX;sw2=S.spWidth;e.preventDefault();});
  document.addEventListener('mousemove',e=>{
    if(!drag2)return;
    S.spWidth=Math.max(200,Math.min(600,sw2+(e.clientX-sx2)));
    document.documentElement.style.setProperty('--sp',S.spWidth+'px');
    updateMainLeft();
  });
  document.addEventListener('mouseup',()=>drag2=false);
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setStatus(m){const e=document.getElementById('status-bar');e.textContent=m;e.classList.add('on');}
function clearStatus(){document.getElementById('status-bar').classList.remove('on');}
function showError(m){const e=document.getElementById('error-banner');e.textContent=m;e.classList.add('on');}
function hideError(){document.getElementById('error-banner').classList.remove('on');}
let _nt;
function notify(m){const e=document.getElementById('notif');e.textContent=m;e.style.display='block';clearTimeout(_nt);_nt=setTimeout(()=>e.style.display='none',2600);}
function copyToClipboard(t){
  if(navigator.clipboard)navigator.clipboard.writeText(t).catch(()=>fbCopy(t));else fbCopy(t);
}
function fbCopy(t){const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;top:-999px';document.body.appendChild(a);a.focus();a.select();try{document.execCommand('copy');}catch{}document.body.removeChild(a);}

// ═══════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('dlg-ov').classList.contains('on')){dlgCancel();return;}
    if(S.chordPanelOpen){closeChordPanel();return;}
    if(document.getElementById('sets-overlay').classList.contains('on')){document.getElementById('sets-overlay').classList.remove('on');return;}
    if(document.getElementById('search-bar').classList.contains('on')){closeSearch();return;}
    if(S.nowPlaying){clearNP();return;}
    if(S.selectedSong){clearFilterPanel();applyFilters();return;}
  }
  if(!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)){
    if((e.key==='k'&&(e.metaKey||e.ctrlKey))||e.key==='/'){e.preventDefault();openSearch();}
  }
});
document.getElementById('search-input').addEventListener('input',e=>handleSearch(e.target.value));
document.getElementById('search-input').addEventListener('keydown',e=>{ if(e.key==='Escape')closeSearch(); });
['key','bpm','theme','word','era','artist','genre','unplayed'].forEach(k=>{
  document.getElementById('flt-'+k).addEventListener('change',e=>{ S.filters[k]=e.target.checked; applyFilters(); });
});

// ═══════════════════════════════════════════════
// DARK MODE
// ═══════════════════════════════════════════════
function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  LS.set('bfm_dark', isDark);
  document.getElementById('dark-btn').classList.toggle('on', isDark);
}
function applyDark() {
  const isDark = !!LS.get('bfm_dark');
  document.body.classList.toggle('dark', isDark);
  document.getElementById('dark-btn').classList.toggle('on', isDark);
}

// ═══════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════
function openSettings() {
  const key = LS.get('bfm_lfm_key') || '';
  showDialog(
    'Settings',
    'Last.fm API key: get a free key at www.last.fm/api/account/create\nPaste it below for accurate per-track genre & mood tags.',
    [{id:'inp-lfm-key', label:'Last.fm API Key (optional)', placeholder:'Enter your Last.fm API key', value:key}],
    () => {
      const newKey = document.getElementById('inp-lfm-key')?.value?.trim() || '';
      if (newKey === key) return;
      if (newKey) {
        LS.set('bfm_lfm_key', newKey);
        LS.del('bfm_lfm');
        document.getElementById('settings-btn').classList.add('on');
        notify('API key saved — hit ↻ to re-enrich with Last.fm');
      } else {
        LS.del('bfm_lfm_key');
        LS.del('bfm_lfm');
        document.getElementById('settings-btn').classList.remove('on');
        notify('API key removed');
      }
    },
    'Save'
  );
}
function updateSettingsBtn() {
  document.getElementById('settings-btn').classList.toggle('on', !!LS.get('bfm_lfm_key'));
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
async function init() {
  loadQueue();
  loadSets();
  S.playHistory = LS.get('bfm_history')||[];
  S.session = LS.get('bfm_session') || null;
  if (!S.session) startSession();
  renderQueue();
  renderPP();
  renderSessionUI();
  initResizes();
  updateSettingsBtn();
  applyDark();
  setSortBy('random');
  // --lp-active CSS var controls filter panel offset
  document.documentElement.style.setProperty('--lp', '180px');
  await loadData();
}

init();
</script>
